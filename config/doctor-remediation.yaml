# pop-pay doctor — remediation catalog (Python repo mirror)
# Text catalog decoupled from code so messaging can evolve without code changes.
# Schema:
#   <check_id>:
#     remediation: "<single-line action user can take>"
#     blocker: true|false

python_version:
  remediation: "Upgrade Python to 3.10 or newer."
  blocker: true

chromium:
  remediation: "Install Google Chrome / Chromium, or set POP_CHROME_PATH to the executable."
  blocker: true

cdp_port:
  remediation: "Kill the conflicting process, or set POP_CDP_URL=http://localhost:<other-port>."
  blocker: false

config_dir:
  remediation: "Run: mkdir -p ~/.config/pop-pay"
  blocker: false

vault:
  remediation: "Run: pop-init-vault  (or set POP_VAULT_PATH to an existing vault)."
  blocker: false

env_vars:
  remediation: "Check ~/.config/pop-pay/.env — see docs/ENV_REFERENCE.md for names and formats."
  blocker: false

policy_config:
  remediation: "POP_ALLOWED_CATEGORIES / POP_ALLOWED_PAYMENT_PROCESSORS must be valid JSON arrays."
  blocker: false

layer1_probe:
  remediation: "Layer 1 is pure local logic — a failure here indicates a bug. File an issue."
  blocker: true

layer2_probe:
  remediation: "Check POP_LLM_API_KEY, POP_LLM_BASE_URL, POP_LLM_MODEL; verify network reachability."
  blocker: false

injector_smoke:
  remediation: "Ensure Chromium can launch headless — see docs/DOCTOR.md troubleshooting."
  blocker: false

# --- F9 — Chrome binary integrity (4-layer) -------------------------------
# See docs/DOCTOR.md §F9 and docs/VAULT_THREAT_MODEL.md §2.8 for rationale.

f9_l1_codesign:
  remediation: "OS-level signature did not verify. Re-install Chrome from its official vendor (Google / Brave / Microsoft / Mozilla) — do not use a binary from a third-party mirror."
  blocker: true

f9_l2_sha_pin:
  remediation: "SHA-256 not in known-good list. Expected between Chrome releases — no action unless running --strict. To bump the list, open a PR adding the new SHA to pop_pay/data/chrome_known_good_sha256.json."
  blocker: false

f9_l3_fork:
  remediation: "Vendor not on whitelist. Options: (1) switch to Google/Brave/Edge/Firefox, (2) add --permissive if you trust the detected vendor, (3) confirm the codesign chain is intact with 'codesign -dv --verbose=4 <path>'."
  blocker: true

f9_l4_extensions:
  remediation: "Audit installed extensions; uninstall any you did not install yourself. pop-pay does not block extensions — this row is informational."
  blocker: false

f9_l4_cdp_port:
  remediation: "Port conflict — another process is on the CDP port. Stop it, or set POP_CDP_URL=http://localhost:<other-port>. A persistent listener may indicate a hijack attempt; see docs/VAULT_THREAT_MODEL.md §2.9."
  blocker: false
